<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>George Nijo</title>
<meta name="description" content="George Nijo — software engineer building infrastructure for AI agents. ssh in and look around.">
<meta property="og:title" content="George Nijo">
<meta property="og:description" content="Software engineer building infrastructure for AI agents — routers, brokers, control planes. ssh in and look around.">
<meta property="og:url" content="https://georgenijo.com">
<meta property="og:type" content="website">
<meta name="theme-color" content="#f6f2e8">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%23f6f2e8'/%3E%3Ctext x='16' y='22' font-family='monospace' font-size='16' font-weight='bold' fill='%23b5351c' text-anchor='middle'%3E%E2%80%BA_%3C/text%3E%3C/svg%3E">
<style>
  /* ── Direction 3 · PAPER v2 ────────────────────────────────────
     Single-page typographic index — no split panes. Menu is huge
     serif lines like a book's table of contents; projects are a
     printed ledger; details are full-page slips.
     Live layer: the cursor itself. Native pointer hidden; a
     blinking ink caret follows the mouse and morphs into a ring
     over anything interactive. Inverts what's under it (blend
     difference), so it never hides content. */
  :root{
    --bg:#f6f2e8;
    --surface:#fbf8f1;
    --fg:#1c1710;
    --muted:#6e6353;
    --faint:#a2957f;
    --border:#1c1710;
    --hairline:#d9d0bd;
    --accent:#b5351c;
    --selbg:rgba(28,23,16,.045);
    --mono:ui-monospace,"SF Mono",SFMono-Regular,Menlo,Consolas,"Cascadia Mono",monospace;
    --serif:'Iowan Old Style','Charter',Georgia,serif;
  }
  *,*::before,*::after{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    background:var(--bg);color:var(--fg);
    font-family:var(--mono);font-size:14px;line-height:1.55;
    overflow:hidden;-webkit-font-smoothing:antialiased;
  }
  @media (max-width:600px){ body{font-size:13px;} }

  /* paper wash */
  body::after{
    content:"";position:fixed;inset:0;z-index:0;pointer-events:none;
    background:radial-gradient(120% 100% at 50% 0%, rgba(28,23,16,.03), transparent 55%);
  }

  /* ── cursor takeover (pointer:fine only) ── */
  @media (pointer:fine){
    body, a, button, input, .row{cursor:none;}
  }
  #cur{
    position:fixed;top:0;left:0;z-index:2000;
    pointer-events:none;
    mix-blend-mode:difference;
  }
  #cur[hidden]{display:none;}
  #cur .core{
    display:block;
    width:11px;height:20px;
    margin:-10px 0 0 -5px;
    background:#fff;
    animation:carets 1.1s steps(1) infinite;
    transition:width .16s ease,height .16s ease,border-radius .16s ease,margin .16s ease,background .16s ease;
  }
  @keyframes carets{50%{opacity:.35;}}
  /* over links / rows / buttons: caret becomes a ring */
  #cur.on .core{
    width:38px;height:38px;
    margin:-19px 0 0 -19px;
    border-radius:50%;
    background:transparent;
    box-shadow:inset 0 0 0 2px #fff;
    animation:none;
  }
  #cur.on .core::after{
    content:"›";
    display:grid;place-items:center;height:100%;
    color:#fff;font:700 16px/1 var(--mono);
  }
  #cur.down .core{transform:scale(.72);}
  .core::after{content:"";}
  @media (prefers-reduced-motion: reduce){
    #cur .core{animation:none;transition:none;}
  }

  .term{position:relative;z-index:1;height:100dvh;display:flex;flex-direction:column;overflow:hidden;}
  :focus{outline:none;}
  :focus-visible{outline:2px solid var(--accent);outline-offset:2px;}

  /* ── boot ── */
  .boot{flex:1;min-height:0;overflow-y:auto;padding:clamp(14px,3vw,32px);}
  .boot pre{margin:0;font:inherit;white-space:pre-wrap;word-break:break-word;}
  .b-dim{color:var(--muted);}
  .b-ok{color:var(--accent);}
  .prompt-sig{color:var(--accent);}
  .cur-b{display:inline-block;width:.62em;height:1.1em;background:var(--fg);vertical-align:-.18em;animation:blink 1.06s steps(1) infinite;}
  @keyframes blink{50%{opacity:0;}}
  .masthead{
    margin:18px 0 0;font-family:var(--serif);
    font-size:clamp(44px,7.5vw,96px);line-height:1.02;
    letter-spacing:-0.025em;font-weight:600;
  }
  .masthead em{font-style:italic;color:var(--accent);}
  .motd-tag{
    color:var(--muted);margin-top:10px;
    text-transform:uppercase;letter-spacing:.08em;font-size:.82em;
    border-top:2px solid var(--border);display:inline-block;padding-top:8px;
  }

  /* ── app frame ── */
  .app{flex:1;min-height:0;display:flex;flex-direction:column;}
  .app[hidden]{display:none;}
  header.bar{
    flex:none;display:flex;align-items:baseline;gap:14px;
    padding:12px clamp(16px,4vw,56px) 10px;
    border-bottom:2px solid var(--border);
  }
  .brand{font-family:var(--serif);font-style:italic;font-size:1.15em;white-space:nowrap;}
  .crumb{color:var(--muted);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:.9em;}
  .crumb b{color:var(--fg);font-weight:400;}
  .conn{flex:none;color:var(--faint);font-size:.78em;white-space:nowrap;text-transform:uppercase;letter-spacing:.08em;}
  @media (max-width:560px){ .conn{display:none;} }

  main.page{
    flex:1;min-width:0;min-height:0;overflow-y:auto;overflow-x:hidden;
    padding:clamp(18px,3.5vw,44px) clamp(16px,4vw,56px) clamp(28px,5vw,64px);
    scrollbar-width:thin;scrollbar-color:var(--hairline) transparent;
  }
  .sheet{max-width:1060px;margin:0 auto;}
  .reveal{animation:fadeUp .18s ease both;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:none;}}

  .vkick{
    color:var(--muted);font-size:.82em;
    text-transform:uppercase;letter-spacing:.08em;
    margin:0 0 6px;
  }
  .vkick .n{color:var(--accent);}
  .vtitle{
    font-family:var(--serif);font-weight:600;font-style:italic;
    font-size:clamp(30px,4.5vw,52px);line-height:1.05;
    letter-spacing:-0.02em;margin:0 0 26px;
  }

  /* ── index (menu) — table of contents in display type ── */
  .rows{border-top:1px solid var(--hairline);}
  .row{
    display:grid;align-items:baseline;width:100%;
    font:inherit;text-align:left;text-decoration:none;color:var(--fg);
    background:none;border:none;border-bottom:1px solid var(--hairline);
    padding:0;min-height:46px;
  }
  .row:hover{background:var(--selbg);}
  .row.sel{background:var(--selbg);}
  .row .tx{display:block;min-width:0;}

  .rows.index .row{
    grid-template-columns:5ch 1fr auto;gap:18px;
    padding:clamp(14px,2.2vw,26px) 6px;
  }
  .rows.index .num{
    color:var(--faint);font-size:.85em;
    letter-spacing:.06em;align-self:center;
  }
  .rows.index .t{
    font-family:var(--serif);font-weight:600;
    font-size:clamp(32px,5.4vw,62px);line-height:1.04;
    letter-spacing:-0.02em;
    transition:transform .14s ease;
  }
  .rows.index .d{
    color:var(--muted);font-size:.88em;align-self:center;
    text-align:right;
  }
  @media (max-width:700px){ .rows.index .row{grid-template-columns:5ch 1fr;} .rows.index .d{display:none;} }
  .rows.index .row.sel .t{font-style:italic;color:var(--accent);transform:translateX(10px);}
  .rows.index .row.sel .num{color:var(--accent);}

  /* ── ledger (projects) ── */
  .rows.ledger .row{
    grid-template-columns:4ch minmax(0,1fr) auto;gap:16px;
    padding:13px 6px;
  }
  .rows.ledger .num{color:var(--faint);font-size:.82em;align-self:center;}
  .rows.ledger .t{
    font-family:var(--serif);font-style:italic;font-weight:600;
    font-size:clamp(19px,2.4vw,24px);letter-spacing:-0.01em;
  }
  .rows.ledger .d{color:var(--muted);font-size:.88em;display:block;}
  .rows.ledger .aux{
    color:var(--faint);font-size:.78em;align-self:center;
    text-transform:uppercase;letter-spacing:.07em;
  }
  .rows.ledger .row.sel .t{color:var(--accent);}
  .rows.ledger .row.sel .num{color:var(--accent);}

  /* ── actions (underlined mono links) ── */
  .acts{margin-top:30px;display:flex;flex-direction:column;align-items:flex-start;gap:2px;border-top:0;}
  .acts .row{
    display:inline-flex;gap:8px;width:auto;min-height:44px;align-items:center;
    border-bottom:none;padding:6px 4px;color:var(--fg);
  }
  .acts .row .t{text-decoration:underline;text-underline-offset:3px;}
  .acts .row.sel .t{color:var(--accent);}
  .acts .row.sel::before{content:"›";color:var(--accent);}

  /* ── printed slip (detail body) ── */
  .slip{
    max-width:72ch;border:2px solid var(--border);
    background:var(--surface);
    padding:clamp(18px,3vw,30px) clamp(18px,3vw,32px);
  }
  .slip p{margin:0 0 12px;max-width:58ch;font-size:15px;}
  .slip p:last-child{margin-bottom:0;}
  .slip .hl{color:var(--accent);}
  .slip .dim{color:var(--muted);}
  .kv{display:flex;gap:12px;margin:3px 0;font-size:15px;}
  .kv .k{color:var(--faint);flex:none;min-width:7ch;}
  .badge{
    display:inline-block;font-size:.6em;color:var(--fg);
    border:1px solid var(--border);padding:2px 8px;vertical-align:6px;
    font-family:var(--mono);font-style:normal;font-weight:400;
    text-transform:uppercase;letter-spacing:.07em;
  }

  footer.status{
    flex:none;display:flex;align-items:center;gap:14px;flex-wrap:wrap;
    padding:8px clamp(16px,4vw,56px);min-height:38px;
    border-top:2px solid var(--border);
    color:var(--faint);font-size:.84em;
  }
  .hint{display:inline-flex;align-items:center;gap:6px;white-space:nowrap;}
  kbd{font:inherit;color:var(--fg);border:1px solid var(--fg);padding:0 6px;}
  button.hint{background:none;border:none;font:inherit;color:var(--faint);padding:2px;}
  button.hint:hover kbd{background:var(--fg);color:var(--bg);}

  .closed{padding:clamp(16px,4vw,36px);}
  .closed p{margin:0 0 6px;color:var(--muted);}
  .closed .msg{color:var(--fg);}
  .reconnect{
    margin-top:18px;font:inherit;color:var(--fg);
    background:transparent;border:2px solid var(--border);
    padding:9px 16px;
  }
  .reconnect:hover{background:var(--fg);color:var(--bg);}

  @media (prefers-reduced-motion: reduce){
    .cur-b,.reveal{animation:none;}
    .rows.index .t{transition:none;}
  }
</style>
</head>
<body>

<div class="term" id="term">
  <div class="boot" id="boot" aria-live="polite"><pre id="bootpre"></pre></div>
  <div class="app" id="app" hidden>
    <header class="bar">
      <span class="brand">George Nijo</span>
      <span class="crumb" id="crumb">~</span>
      <span class="conn">ssh · ed25519 · paper</span>
    </header>
    <main class="page" id="page" tabindex="-1"></main>
    <footer class="status" id="status"></footer>
  </div>
</div>

<div id="cur" hidden aria-hidden="true"><span class="core"></span></div>

<script>
(function(){
"use strict";
var RM = matchMedia("(prefers-reduced-motion: reduce)").matches;
var FINE = matchMedia("(pointer:fine)").matches;

/* ── live layer: cursor takeover ────────────────────────────────
   One fixed element, lerped toward the pointer each frame. Default
   state is a blinking ink caret (the terminal cursor escaped into
   the page); over anything interactive it opens into a ring with a
   "›". mix-blend-mode:difference inverts whatever sits under it —
   readable on cream, ink, and vermilion alike, and it never
   obscures text the way a trail did. Touch devices keep the native
   cursor untouched. */
var curEl=document.getElementById("cur");
if(FINE){
  var cx=-100,cy=-100,px=-100,py=-100,shown=false;
  addEventListener("pointermove",function(e){
    cx=e.clientX;cy=e.clientY;
    if(!shown){shown=true;px=cx;py=cy;curEl.hidden=false;}
  },{passive:true});
  document.addEventListener("pointerleave",function(){shown=false;curEl.hidden=true;});
  addEventListener("pointerdown",function(){curEl.classList.add("down");});
  addEventListener("pointerup",function(){curEl.classList.remove("down");});
  document.addEventListener("pointerover",function(e){
    var hit=e.target.closest&&e.target.closest("a,button,.row,input,kbd");
    curEl.classList.toggle("on",!!hit);
  });
  (function curLoop(){
    var k=RM?1:0.35;
    px+=(cx-px)*k;py+=(cy-py)*k;
    curEl.style.transform="translate("+px+"px,"+py+"px)";
    requestAnimationFrame(curLoop);
  })();
}

/* ── content (mirrors ssh-tui/content.go) ───────────────────── */
var GH = "https://github.com/georgenijo";
var PROJECTS = [
  {name:"nadirclaw",   lang:"Python",     tag:"LLM router & cost optimizer",
   desc:"Routes every prompt to the cheapest model that can actually handle it. Scores request complexity, tracks per-provider spend in real time, and fails over cleanly when a provider rate-limits."},
  {name:"ghosthands",  lang:"Python",     tag:"Local computer-use for macOS",
   desc:"Drives the Mac desktop with local models: screenshots in, accessibility-tree actions out. Nothing between your screen and the agent leaves the machine."},
  {name:"usher",       lang:"Go",         tag:"MCP broker",
   desc:"One MCP endpoint that fans out to many servers. Handles auth, health checks, and tool-name collisions so agents see a single clean catalog."},
  {name:"hangar",      lang:"Rust",       tag:"Agent control plane",
   desc:"Where agents live between jobs. Scheduling, budgets, kill switches, and an audit log for every tool call a fleet makes."},
  {name:"omen",        lang:"Rust",       tag:"Code intel for AI agents",
   desc:"Feeds an agent the ten lines that matter instead of the whole repo. Symbol graphs, blast-radius queries, and context packing tuned for LLM windows."},
  {name:"hermes-agent",lang:"Python",     tag:"Errand-running personal agent",
   desc:"A daemon that reads the inbox, watches the calendar, and drafts the boring replies. Sandboxed tools; a human signs off on anything that sends."},
  {name:"fleetmap",    lang:"Go",         tag:"Live map of running agents",
   desc:"One screen showing every agent, what it is doing, and what it is spending. The ops view an agent fleet deserves."},
  {name:"gauge",       lang:"Go",         tag:"Eval harness for agent stacks",
   desc:"Replayable scenario suites for routers, brokers, and agents. Catch the regression before it pages you."},
  {name:"aperture",    lang:"Swift",      tag:"iOS film camera",
   desc:"A film camera in your pocket: fixed stocks, 36 exposures, no preview until the roll is developed. Patience as a feature."},
  {name:"star-maker",  lang:"Python",     tag:"Constellations from your data",
   desc:"Turns any dataset into a navigable night sky. Mostly an excuse to draw stars with math."}
];
var MENU = [
  {id:"about",    t:"about",    d:"who's at the keyboard"},
  {id:"projects", t:"projects", d:"ten repos, four languages"},
  {id:"now",      t:"now",      d:"what's cooking — AgentOS"},
  {id:"contact",  t:"contact",  d:"say hello"}
];
var ABOUT_HTML =
  '<p><span class="hl">George Nijo</span> — software engineer in Boston.</p>'+
  '<p>I build infrastructure for AI agents: LLM routers, MCP brokers, and agent control planes — the plumbing that keeps a fleet of agents fast, cheap, and accountable.</p>'+
  '<p>Currently building <span class="hl">AgentOS</span>, a personal + home agent operating system.</p>'+
  '<p class="dim">Python · Go · Rust · just enough Swift</p>';
var NOW_HTML =
  '<p>Heads-down on <span class="hl">AgentOS</span> — one control plane for the agents that run my code, my inbox, and (eventually) the house.</p>'+
  '<div class="kv"><span class="k">hangar</span><span class="dim">scheduling + budgets for long-lived agents</span></div>'+
  '<div class="kv"><span class="k">usher</span><span class="dim">auth story for brokered MCP servers</span></div>'+
  '<div class="kv"><span class="k">omen</span><span class="dim">context packing that fits the window</span></div>';
var CONTACT_HTML =
  '<p class="dim">no forms, no funnels — just these two:</p>'+
  '<div class="kv"><span class="k">mailto</span><span class="hl">george.nijo8@gmail.com</span></div>'+
  '<div class="kv"><span class="k">https</span><span class="hl">github.com/georgenijo</span></div>';

/* ── boot ───────────────────────────────────────────────────── */
var bootPre=document.getElementById("bootpre"), bootWrap=document.getElementById("boot"),
    appEl=document.getElementById("app"), booting=false, bootSkip=false;
function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
var BOOT_LINES=[
  {h:'<span class="b-dim">Connecting to georgenijo.com port 22.</span>',w:240},
  {h:'<span class="b-dim">Host key:</span> ssh-ed25519 SHA256:lba/GXO1RlqaWyX9VvHRpDLLK8egub1dOScGWr7PHPU <span class="b-ok">✓ known</span>',w:300},
  {h:'<span class="b-ok">Authenticated to georgenijo.com (via publickey).</span>',w:340}
];
function sleep(ms){return new Promise(function(res){ if(bootSkip||RM) return res(); setTimeout(res,ms); });}
function runBoot(){
  booting=true; bootSkip=false;
  appEl.hidden=true; bootWrap.hidden=false; bootPre.innerHTML="";
  var CMD="ssh georgenijo.com", html='<span class="prompt-sig">➜ ~ $</span> ';
  bootPre.innerHTML=html+'<span class="cur-b"></span>';
  var p=Promise.resolve();
  CMD.split("").forEach(function(ch,i){
    p=p.then(function(){return sleep(30).then(function(){
      html='<span class="prompt-sig">➜ ~ $</span> '+esc(CMD.slice(0,i+1));
      bootPre.innerHTML=html+'<span class="cur-b"></span>';
    });});
  });
  p=p.then(function(){return sleep(280);});
  BOOT_LINES.forEach(function(line){
    p=p.then(function(){return sleep(line.w).then(function(){
      html+="\n"+line.h;
      bootPre.innerHTML=html+'\n<span class="cur-b"></span>';
    });});
  });
  p.then(function(){return sleep(260);}).then(function(){
    bootPre.innerHTML=html+
      '<div class="masthead">George <em>Nijo</em></div>'+
      '<div class="motd-tag">software engineer · boston · agent infrastructure</div>';
    return sleep(950);
  }).then(function(){
    booting=false; bootWrap.hidden=true; appEl.hidden=false; go("menu");
  });
}
function skipBoot(){ bootSkip=true; }

/* ── TUI state (same machine as production index.html) ──────── */
var pageEl=document.getElementById("page"), crumbEl=document.getElementById("crumb"),
    statusEl=document.getElementById("status");
var ST={view:"menu",proj:null,rows:[],cursor:0,cursors:{}};
var PARENT={about:"menu",projects:"menu",now:"menu",contact:"menu",project:"projects",menu:null,closed:null};

function projByName(n){for(var i=0;i<PROJECTS.length;i++)if(PROJECTS[i].name===n)return PROJECTS[i];return null;}
function projDetailHTML(p){
  return "<p>"+p.desc+"</p>"+
    '<div class="kv"><span class="k">repo</span><span class="dim">github.com/georgenijo/'+p.name+'</span></div>'+
    '<div class="kv"><span class="k">lang</span><span class="dim">'+p.lang+"</span></div>";
}
function go(view,opts){opts=opts||{};ST.cursors[viewKey()]=ST.cursor;ST.view=view;if("proj" in opts)ST.proj=opts.proj;render();}
function viewKey(){return ST.view==="project"?"project:"+(ST.proj||""):ST.view;}
function back(){var p=PARENT[ST.view];if(p)go(p);}
function quit(){ST.cursors={};ST.view="closed";render();}

function h(tag,cls,htmlStr){var el=document.createElement(tag);if(cls)el.className=cls;if(htmlStr!=null)el.innerHTML=htmlStr;return el;}
function makeRow(spec,idx){
  var el;
  if(spec.href){el=h("a","row");el.href=spec.href;el.target="_blank";el.rel="noopener";}
  else{el=h("button","row");el.type="button";}
  var inner="";
  if(spec.num)inner+='<span class="num">'+spec.num+"</span>";
  inner+='<span class="tx"><span class="t">'+spec.t+"</span>";
  if(spec.d&&spec.dInline)inner+=' <span class="d">'+spec.d+"</span>";
  inner+="</span>";
  if(spec.d&&!spec.dInline)inner+='<span class="d">'+spec.d+"</span>";
  if(spec.aux)inner+='<span class="aux">'+spec.aux+"</span>";
  el.innerHTML=inner;
  el.addEventListener("click",function(){
    ST.cursor=idx;paintCursor();
    if(!spec.href&&spec.on)spec.on();
  });
  el.addEventListener("focus",function(){ST.cursor=idx;paintCursor();});
  return el;
}
function scrollNear(el){
  var top=el.offsetTop-pageEl.offsetTop, bot=top+el.offsetHeight;
  if(top<pageEl.scrollTop)pageEl.scrollTop=top;
  else if(bot>pageEl.scrollTop+pageEl.clientHeight)pageEl.scrollTop=bot-pageEl.clientHeight;
}
function paintCursor(){
  ST.rows.forEach(function(r,i){r.el.classList.toggle("sel",i===ST.cursor);});
  var cur=ST.rows[ST.cursor];
  if(cur)scrollNear(cur.el);
}
function setStatus(hints){
  statusEl.innerHTML="";
  hints.forEach(function(hnt){
    if(hnt.on){
      var b=h("button","hint");b.type="button";
      b.innerHTML="<kbd>"+hnt.k+"</kbd> "+hnt.l;
      b.addEventListener("click",hnt.on);statusEl.appendChild(b);
    } else statusEl.appendChild(h("span","hint","<kbd>"+hnt.k+"</kbd> "+hnt.l));
  });
}
function stdHints(list){
  var hints=[];
  if(list)hints.push({k:"↑/↓",l:"navigate"},{k:"enter",l:"select"});
  if(PARENT[ST.view])hints.push({k:"esc",l:"back",on:back});
  hints.push({k:"q",l:"quit",on:quit});
  return hints;
}
function frame(crumb){
  crumbEl.innerHTML=crumb;
  pageEl.innerHTML="";ST.rows=[];
  var wrap=h("div","reveal sheet");pageEl.appendChild(wrap);return wrap;
}
function addRows(wrap,specs,restoreKey,cls){
  var box=h("div","rows"+(cls?" "+cls:""));
  specs.forEach(function(s){
    var idx=ST.rows.length;
    var el=makeRow(s,idx);
    ST.rows.push({el:el,on:s.on,href:s.href});
    box.appendChild(el);
  });
  wrap.appendChild(box);
  var saved=ST.cursors[restoreKey];
  ST.cursor=(typeof saved==="number"&&saved<ST.rows.length)?saved:0;
  paintCursor();
}
function pad2(n){return (n<10?"0":"")+n;}

/* ── views ──────────────────────────────────────────────────── */
function render(){
  pageEl.scrollTop=0;
  switch(ST.view){
    case "menu":vMenu();break;
    case "about":vSheet("about","whoami",ABOUT_HTML);break;
    case "projects":vProjects();break;
    case "project":vProject();break;
    case "now":vSheet("now","updated july 2026",NOW_HTML);break;
    case "contact":vSheet("contact","say hello",CONTACT_HTML);break;
    case "closed":vClosed();return;
  }
}
function vMenu(){
  var w=frame("<b>georgenijo.com</b> ~");
  w.appendChild(h("p","vkick","index <span class='n'>·</span> software engineer · boston"));
  addRows(w,MENU.map(function(m,i){
    return {num:pad2(i+1),t:m.t,d:m.d,on:function(){go(m.id);}};
  }),"menu","index");
  setStatus(stdHints(true));
}
function vSheet(id,sub,body){
  var w=frame("<b>~</b> / "+id);
  w.appendChild(h("p","vkick",sub));
  w.appendChild(h("p","vtitle",id));
  w.appendChild(h("div","slip",body));
  addRows(w,[
    {t:"see the projects",on:function(){go("projects");}},
    {t:"back to index",on:back}
  ],id,"acts");
  setStatus(stdHints(false));
}
function vProjects(){
  var w=frame("<b>~</b> / projects");
  w.appendChild(h("p","vkick","ledger · "+PROJECTS.length+" repos · four languages"));
  w.appendChild(h("p","vtitle","projects"));
  addRows(w,PROJECTS.map(function(p,i){
    return {num:pad2(i+1),t:p.name,d:p.tag,dInline:true,aux:p.lang,
            on:function(){go("project",{proj:p.name});}};
  }),"projects","ledger");
  setStatus(stdHints(true));
}
function vProject(){
  var p=projByName(ST.proj);
  if(!p)return go("projects");
  var w=frame("<b>~</b> / projects / "+p.name);
  w.appendChild(h("p","vkick",p.tag));
  w.appendChild(h("p","vtitle",p.name+' <span class="badge">'+p.lang+"</span>"));
  w.appendChild(h("div","slip",projDetailHTML(p)));
  addRows(w,[
    {t:"open github.com/georgenijo/"+p.name+" ↗",href:GH+"/"+p.name},
    {t:"back to projects",on:back}
  ],"project:"+p.name,"acts");
  setStatus(stdHints(false));
}
function vClosed(){
  crumbEl.innerHTML="";appEl.hidden=true;
  bootWrap.hidden=false;
  bootWrap.innerHTML='<div class="closed reveal">'+
    '<p class="msg">Connection to georgenijo.com closed.</p>'+
    '<p>Thanks for stopping by.</p>'+
    '<button class="reconnect" type="button" id="reconn">➜ ~ $ ssh georgenijo.com  (reconnect)</button></div>';
  var b=document.getElementById("reconn");
  b.addEventListener("click",restart);b.focus();
}
function restart(){
  bootWrap.innerHTML="";
  var pre=document.createElement("pre");pre.id="bootpre";
  bootWrap.appendChild(pre);bootPre=pre;
  ST.view="menu";ST.cursors={};runBoot();
}

/* ── input ──────────────────────────────────────────────────── */
bootWrap.addEventListener("click",function(){if(booting)skipBoot();});
window.addEventListener("keydown",function(e){
  if(booting){skipBoot();return;}
  if(ST.view==="closed"){
    if(e.key==="Enter"||e.key.toLowerCase()==="r"){e.preventDefault();restart();}
    return;
  }
  var k=e.key;
  if(k==="ArrowDown"||k==="j"){e.preventDefault();if(ST.rows.length){ST.cursor=Math.min(ST.cursor+1,ST.rows.length-1);paintCursor();}}
  else if(k==="ArrowUp"||k==="k"){e.preventDefault();if(ST.rows.length){ST.cursor=Math.max(ST.cursor-1,0);paintCursor();}}
  else if(k==="Enter"){
    var r=ST.rows[ST.cursor];if(!r)return;
    if(document.activeElement===r.el)return;
    e.preventDefault();
    if(r.href)r.el.click();else if(r.on)r.on();
  }
  else if(k==="Escape"){e.preventDefault();back();}
  else if(k==="q"&&!e.metaKey&&!e.ctrlKey&&!e.altKey){e.preventDefault();quit();}
});

runBoot();
})();
</script>
