<style>
  /* ── Direction 3 · PAPER v2 ────────────────────────────────────
     Single-page typographic index — no split panes. Menu is huge
     serif lines like a book's table of contents; projects are a
     printed ledger; details are full-page slips.
     Live layer: the cursor itself. Native pointer hidden; a
     blinking ink caret follows the mouse and morphs into a
     crop-mark viewfinder frame over anything interactive. The
     caret inverts what's under it (blend difference), so it never
     hides content. */
  :root{
    --bg:#f6f2e8;
    --surface:#fbf8f1;
    --fg:#1c1710;
    --muted:#6e6353;
    --faint:#a2957f;
    --border:#1c1710;
    --hairline:#d9d0bd;
    --accent:#b5351c;
    --selbg:rgba(28,23,16,.045);
    --wash:rgba(28,23,16,.03);
    --mono:ui-monospace,"SF Mono",SFMono-Regular,Menlo,Consolas,"Cascadia Mono",monospace;
    --serif:'Iowan Old Style','Charter',Georgia,serif;
  }
  /* dark negative of the paper theme (media-query only, no JS toggle) */
  @media (prefers-color-scheme: dark){
    :root{
      --bg:#171310;
      --surface:#1f1a14;
      --fg:#e8e2d4;
      --muted:#a2957f;
      --faint:#6e6353;
      --border:#e8e2d4;
      --hairline:#3a3126;
      --accent:#e06a50;
      --selbg:rgba(232,226,212,.05);
      --wash:rgba(232,226,212,.035);
    }
  }
  *,*::before,*::after{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    background:var(--bg);color:var(--fg);
    font-family:var(--mono);font-size:14px;line-height:1.55;
    overflow:hidden;-webkit-font-smoothing:antialiased;
  }
  @media (max-width:600px){ body{font-size:13px;} }

  /* paper wash */
  body::after{
    content:"";position:fixed;inset:0;z-index:0;pointer-events:none;
    background:radial-gradient(120% 100% at 50% 0%, var(--wash), transparent 55%);
  }

  /* ── cursor takeover (pointer:fine only) ── */
  @media (pointer:fine){
    body, a, button, input, .row{cursor:none;}
  }
  #cur{
    position:fixed;top:0;left:0;z-index:2000;
    pointer-events:none;
  }
  #cur[hidden]{display:none;}
  #cur .core{
    display:block;
    width:11px;height:20px;
    margin:-10px 0 0 -5px;
    background:#fff;
    mix-blend-mode:difference;
    animation:carets 1.1s steps(1) infinite;
    transition:opacity .12s ease,transform .12s ease;
  }
  @keyframes carets{50%{opacity:.35;}}
  /* over links / rows / buttons: caret morphs into a crop-mark /
     viewfinder frame — four corner brackets in the accent ink
     (this is the cursor's share of the one-accent budget) */
  #cur.on .core{opacity:0;transform:scale(.45);animation:none;}
  #cur.down .core{transform:scale(.72);}
  #cur .fr{
    position:absolute;left:0;top:0;
    width:30px;height:30px;margin:-15px 0 0 -15px;
    opacity:0;transform:scale(.5);
    transition:opacity .12s ease,transform .12s ease;
  }
  #cur.on .fr{opacity:1;transform:scale(1);}
  #cur.on.down .fr{transform:scale(.78);} /* brackets tighten on press */
  #cur .fr i{position:absolute;width:9px;height:9px;border:0 solid var(--accent);}
  #cur .fr i:nth-child(1){left:0;top:0;border-top-width:2px;border-left-width:2px;}
  #cur .fr i:nth-child(2){right:0;top:0;border-top-width:2px;border-right-width:2px;}
  #cur .fr i:nth-child(3){left:0;bottom:0;border-bottom-width:2px;border-left-width:2px;}
  #cur .fr i:nth-child(4){right:0;bottom:0;border-bottom-width:2px;border-right-width:2px;}
  @media (prefers-reduced-motion: reduce){
    #cur .core{animation:none;transition:none;}
    #cur .fr{transition:none;}
  }

  .term{position:relative;z-index:1;height:100dvh;display:flex;flex-direction:column;overflow:hidden;}
  :focus{outline:none;}
  :focus-visible{outline:2px solid var(--accent);outline-offset:2px;}

  /* ── boot ── */
  .boot{flex:1;min-height:0;overflow-y:auto;padding:clamp(14px,3vw,32px);}

  .b-dim{color:var(--muted);}
  .b-ok{color:var(--accent);}
  .prompt-sig{color:var(--accent);}
  .cur-b{display:inline-block;width:.62em;height:1.1em;background:var(--fg);vertical-align:-.18em;animation:blink 1.06s steps(1) infinite;}
  @keyframes blink{50%{opacity:0;}}
  .masthead{

    text-transform:uppercase;letter-spacing:.08em;font-size:.82em;
    border-top:2px solid var(--border);display:inline-block;padding-top:8px;
  }

  .app{flex:1;min-height:0;display:flex;flex-direction:column;}

    min-height:44px;padding:0 5px;margin:-13px 0;

  .crumb-lnk:hover{color:var(--fg);text-decoration:underline;text-underline-offset:3px;}

  main.page{
    flex:1;min-width:0;min-height:0;overflow-y:auto;overflow-x:hidden;
    padding:clamp(18px,3.5vw,44px) clamp(16px,4vw,56px) clamp(28px,5vw,64px);
    scrollbar-width:thin;scrollbar-color:var(--hairline) transparent;
  }
  .sheet{max-width:1060px;margin:0 auto;}
  .reveal{animation:fadeUp .18s ease both;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:none;}}

  /* slip "printing": lines rise in with a hair of ink bleed;
     titles land like a rubber stamp. Entry-only — nothing loops. */
  .ink{animation:inkIn .15s ease both;}
  @keyframes inkIn{
    from{opacity:0;transform:translateY(5px);text-shadow:0 0 .4px currentColor;}
    to{opacity:1;transform:none;text-shadow:none;}
  }
  .stamp{animation:stampIn .24s cubic-bezier(.2,.7,.3,1) both;transform-origin:18% 60%;}
  @keyframes stampIn{
    0%{opacity:0;transform:scale(1.06) rotate(-.5deg);}
    55%{opacity:1;transform:scale(.992) rotate(.15deg);}
    100%{opacity:1;transform:none;}
  }

  .vkick{
    color:var(--muted);font-size:.82em;
    text-transform:uppercase;letter-spacing:.08em;
    margin:0 0 6px;
  }
  .vkick .n{color:var(--accent);}
  .vtitle{
    font-family:var(--serif);font-weight:600;font-style:italic;
    font-size:clamp(30px,4.5vw,52px);line-height:1.05;
    letter-spacing:-0.02em;margin:0 0 26px;
  }

  /* ── index (menu) — table of contents in display type ── */
  .rows{border-top:1px solid var(--hairline);}
  .row{
    display:grid;align-items:baseline;width:100%;
    font:inherit;text-align:left;text-decoration:none;color:var(--fg);
    background:none;border:none;border-bottom:1px solid var(--hairline);
    padding:0;min-height:46px;
  }
  .row:hover{background:var(--selbg);}
  .row.sel{background:var(--selbg);}
  .row .tx{display:block;min-width:0;}

  .rows.index .row{
    grid-template-columns:5ch 1fr auto;gap:18px;
    padding:clamp(14px,2.2vw,26px) 6px;
  }
  .rows.index .num{
    color:var(--faint);font-size:.85em;
    letter-spacing:.06em;align-self:center;
  }
  .rows.index .t{
    font-family:var(--serif);font-weight:600;
    font-size:clamp(32px,5.4vw,62px);line-height:1.04;
    letter-spacing:-0.02em;
    transition:transform .14s ease;
  }
  .rows.index .d{
    color:var(--muted);font-size:.88em;align-self:center;
    text-align:right;
  }
  @media (max-width:700px){ .rows.index .row{grid-template-columns:5ch 1fr;} .rows.index .d{display:none;} }
  .rows.index .row.sel .t{font-style:italic;color:var(--accent);transform:translateX(10px);}
  .rows.index .row.sel .num{color:var(--accent);}

  /* ── ledger (projects) ── */
  .rows.ledger .row{
    grid-template-columns:4ch minmax(0,1fr) auto;gap:16px;
    padding:13px 6px;
  }
  .rows.ledger .num{color:var(--faint);font-size:.82em;align-self:center;}
  .rows.ledger .t{
    font-family:var(--serif);font-style:italic;font-weight:600;
    font-size:clamp(19px,2.4vw,24px);letter-spacing:-0.01em;
  }
  .rows.ledger .d{color:var(--muted);font-size:.88em;display:block;}
  .rows.ledger .aux{
    color:var(--faint);font-size:.78em;align-self:center;
    text-transform:uppercase;letter-spacing:.07em;
  }
  .rows.ledger .row.sel .t{color:var(--accent);}
  .rows.ledger .row.sel .num{color:var(--accent);}

  /* ── actions (underlined mono links) ── */
  .acts{margin-top:30px;display:flex;flex-direction:column;align-items:flex-start;gap:2px;border-top:0;}
  .acts .row{
    display:inline-flex;gap:8px;width:auto;min-height:44px;align-items:center;
    border-bottom:none;padding:6px 4px;color:var(--fg);
  }
  .acts .row .t{text-decoration:underline;text-underline-offset:3px;}
  .acts .row.sel .t{color:var(--accent);}
  .acts .row.sel::before{content:"›";color:var(--accent);}

  /* ── printed slip (detail body) ── */
  .slip{
    max-width:72ch;border:2px solid var(--border);
    background:var(--surface);
    padding:clamp(18px,3vw,30px) clamp(18px,3vw,32px);
  }
  .slip p{margin:0 0 12px;max-width:58ch;font-size:15px;}
  .slip p:last-child{margin-bottom:0;}
  .slip .hl{color:var(--accent);}
  .slip .dim{color:var(--muted);}
  .kv{display:flex;gap:12px;margin:3px 0;font-size:15px;}
  .kv .k{color:var(--faint);flex:none;min-width:10ch;}
  .row .k{color:var(--faint);flex:none;min-width:10ch;}
  .rows.kvrows{margin-top:10px;}
  .badge{
    display:inline-block;font-size:.6em;color:var(--fg);
    border:1px solid var(--border);padding:2px 8px;vertical-align:6px;
    font-family:var(--mono);font-style:normal;font-weight:400;
    text-transform:uppercase;letter-spacing:.07em;
  }

  footer.status{
    flex:none;display:flex;align-items:center;gap:14px;flex-wrap:wrap;
    padding:8px clamp(16px,4vw,56px);min-height:38px;
    border-top:2px solid var(--border);
    color:var(--faint);font-size:.84em;
  }
  .hint{display:inline-flex;align-items:center;gap:6px;white-space:nowrap;}
  kbd{font:inherit;color:var(--fg);border:1px solid var(--fg);padding:0 6px;}
  button.hint{background:none;border:none;font:inherit;color:var(--faint);padding:2px;}
  button.hint:hover kbd{background:var(--fg);color:var(--bg);}

  .closed{padding:clamp(16px,4vw,36px);}
  .closed p{margin:0 0 6px;color:var(--muted);}
  .closed .msg{color:var(--fg);}
  .reconnect{
    margin-top:18px;font:inherit;color:var(--fg);
    background:transparent;border:2px solid var(--border);
    padding:9px 16px;
  }
  .reconnect:hover{background:var(--fg);color:var(--bg);}

  @media (prefers-reduced-motion: reduce){
    .cur-b,.reveal,.ink,.stamp{animation:none;}
    .rows.index .t{transition:none;}
  }
</style>

(function(){

var RM = matchMedia("(prefers-reduced-motion: reduce)").matches;

   state is a blinking ink caret (the terminal cursor escaped into

    bootPre.innerHTML=html+
      '<div class="masthead">George <em>Nijo</em></div>'+
      '<div class="motd-tag">software engineer · boston · agent infrastructure</div>';
    return sleep(950);
  }).then(function(){
    booting=false; bootWrap.hidden=true; appEl.hidden=false; go("menu");
  });
}
function skipBoot(){ bootSkip=true; }

/* ── TUI state (same machine as production index.html) ──────── */
var pageEl=document.getElementById("page"), crumbEl=document.getElementById("crumb"),
    statusEl=document.getElementById("status");
var ST={view:"menu",proj:null,rows:[],cursor:0,cursors:{}};
var PARENT={about:"menu",projects:"menu",now:"menu",contact:"menu",project:"projects",menu:null,closed:null};

function projByName(n){for(var i=0;i<PROJECTS.length;i++)if(PROJECTS[i].name===n)return PROJECTS[i];return null;}
function projDetailHTML(p){
  return "<p>"+p.desc+"</p>"+
    '<div class="kv"><span class="k">repo</span><span class="dim">github.com/georgenijo/'+p.name+'</span></div>'+
    '<div class="kv"><span class="k">lang</span><span class="dim">'+p.lang+"</span></div>";
}
function go(view,opts){opts=opts||{};ST.cursors[viewKey()]=ST.cursor;ST.view=view;if("proj" in opts)ST.proj=opts.proj;render();}
function viewKey(){return ST.view==="project"?"project:"+(ST.proj||""):ST.view;}
function back(){var p=PARENT[ST.view];if(p)go(p);}
function quit(){ST.cursors={};ST.view="closed";render();}

function h(tag,cls,htmlStr){var el=document.createElement(tag);if(cls)el.className=cls;if(htmlStr!=null)el.innerHTML=htmlStr;return el;}
function makeRow(spec,idx){
  var el;
  if(spec.href){
    el=h("a","row");el.href=spec.href;
    if(spec.href.indexOf("mailto:")!==0){el.target="_blank";el.rel="noopener";}
  }
  else{el=h("button","row");el.type="button";}
  var inner="";
  if(spec.num)inner+='<span class="num">'+spec.num+"</span>";
  if(spec.k)inner+='<span class="k">'+spec.k+"</span>";
  inner+='<span class="tx"><span class="t">'+spec.t+"</span>";
  if(spec.d&&spec.dInline)inner+=' <span class="d">'+spec.d+"</span>";
  inner+="</span>";
  if(spec.d&&!spec.dInline)inner+='<span class="d">'+spec.d+"</span>";
  if(spec.aux)inner+='<span class="aux">'+spec.aux+"</span>";
  el.innerHTML=inner;
  el.addEventListener("click",function(){
    ST.cursor=idx;paintCursor();
    if(!spec.href&&spec.on)spec.on();
  });
  el.addEventListener("focus",function(){ST.cursor=idx;paintCursor();});
  return el;
}
function scrollNear(el){
  var top=el.offsetTop-pageEl.offsetTop, bot=top+el.offsetHeight;
  if(top<pageEl.scrollTop)pageEl.scrollTop=top;
  else if(bot>pageEl.scrollTop+pageEl.clientHeight)pageEl.scrollTop=bot-pageEl.clientHeight;
}
function paintCursor(){
  ST.rows.forEach(function(r,i){r.el.classList.toggle("sel",i===ST.cursor);});
  var cur=ST.rows[ST.cursor];
  if(cur)scrollNear(cur.el);
}
function setStatus(hints){
  statusEl.innerHTML="";
  hints.forEach(function(hnt){
    if(hnt.on){
      var b=h("button","hint");b.type="button";
      b.innerHTML="<kbd>"+hnt.k+"</kbd> "+hnt.l;
      b.addEventListener("click",hnt.on);statusEl.appendChild(b);
    } else statusEl.appendChild(h("span","hint","<kbd>"+hnt.k+"</kbd> "+hnt.l));
  });
}
function stdHints(list){
  var hints=[];
  if(list)hints.push({k:"↑/↓",l:"navigate"},{k:"enter",l:"select"});
  if(PARENT[ST.view])hints.push({k:"esc",l:"back",on:back});
  hints.push({k:"q",l:"quit",on:quit});
  return hints;
}
/* frame(): builds the header crumb + a fresh sheet.
   Pass a string for a static crumb (menu), or an array of
   {t,go?} segments — segments with `go` become clickable, and a
   "← back" control is prepended (esc keeps working as before). */
function frame(crumb){
  crumbEl.innerHTML="";
  if(typeof crumb==="string"){
    crumbEl.appendChild(h("span","path",crumb));
  }else{
    var bk=h("button","crumb-lnk crumb-back","← back");
    bk.type="button";bk.setAttribute("aria-label","go back");
    bk.addEventListener("click",back);
    crumbEl.appendChild(bk);
    var path=h("span","path");
    crumb.forEach(function(seg,i){
      if(i)path.appendChild(document.createTextNode(" / "));
      if(seg.go){
        var b=h("button","crumb-lnk",seg.t);b.type="button";
        b.addEventListener("click",function(){go(seg.go);});
        path.appendChild(b);
      }else path.appendChild(h("b",null,seg.t));
    });
    crumbEl.appendChild(path);
  }
  pageEl.innerHTML="";ST.rows=[];
  var wrap=h("div","reveal sheet");pageEl.appendChild(wrap);return wrap;
}
/* slip "printing": stagger the sheet's lines in, ~25ms apart,
   capped so the whole entry settles well under 350ms. Entry only —
   reduced-motion skips it entirely (CSS also disables .ink/.stamp). */
function inkIn(wrap){
  if(RM)return;
  var els=wrap.querySelectorAll(".vkick:not(.stamp),.slip>*,.acts .row");
  for(var i=0;i<els.length;i++){
    els[i].classList.add("ink");
    els[i].style.animationDelay=Math.min(i*25,180)+"ms";
  }
}
function addRows(wrap,specs,restoreKey,cls){
  var box=h("div","rows"+(cls?" "+cls:""));
  specs.forEach(function(s){
    var idx=ST.rows.length;
    var el=makeRow(s,idx);
    ST.rows.push({el:el,on:s.on,href:s.href});
    box.appendChild(el);
  });
  wrap.appendChild(box);
  var saved=ST.cursors[restoreKey];
  ST.cursor=(typeof saved==="number"&&saved<ST.rows.length)?saved:0;
  paintCursor();
}
function pad2(n){return (n<10?"0":"")+n;}

/* ── views ──────────────────────────────────────────────────── */
function render(){
  pageEl.scrollTop=0;
  switch(ST.view){
    case "menu":vMenu();break;
    case "about":vSheet("about","whoami",ABOUT_HTML);break;
    case "projects":vProjects();break;
    case "project":vProject();break;
    case "now":vSheet("now","updated july 2026",NOW_HTML);break;
    case "contact":vContact();break;
    case "closed":vClosed();return;
  }
}
function vMenu(){
  var w=frame("<b>georgenijo.com</b> ~");
  w.appendChild(h("p","vkick","index <span class='n'>·</span> software engineer · boston"));
  addRows(w,MENU.map(function(m,i){
    return {num:pad2(i+1),t:m.t,d:m.d,on:function(){go(m.id);}};
  }),"menu","index");
  setStatus(stdHints(true));
}
function vContact(){
  var w=frame([{t:"~",go:"menu"},{t:"contact"}]);
  w.appendChild(h("p","vkick","say hello"));
  w.appendChild(h("p","vtitle stamp","contact"));
  var slip=h("div","slip",CONTACT_INTRO);
  w.appendChild(slip);
  addRows(slip,[
    {k:"mailto",t:EMAIL,href:"mailto:"+EMAIL},
    {k:"github",t:"github.com/georgenijo",href:GH},
    {k:"linkedin",t:"linkedin.com/in/georgenijo",href:LI}
  ],"contact","kvrows");
  addRows(w,[{t:"back to index",on:back}],"contact","acts");
  inkIn(w);
  setStatus(stdHints(false));
}
function vSheet(id,sub,body,acts){
  var w=frame([{t:"~",go:"menu"},{t:id}]);
  w.appendChild(h("p","vkick",sub));
  w.appendChild(h("p","vtitle stamp",id));
  w.appendChild(h("div","slip",body));
  addRows(w,acts||[
    {t:"see the projects",on:function(){go("projects");}},
    {t:"back to index",on:back}
  ],id,"acts");
  inkIn(w);
  setStatus(stdHints(false));
}
function vProjects(){
  var w=frame([{t:"~",go:"menu"},{t:"projects"}]);
  w.appendChild(h("p","vkick","ledger · "+PROJECTS.length+" repos · five languages"));
  w.appendChild(h("p","vtitle","projects"));
  addRows(w,PROJECTS.map(function(p,i){
    return {num:pad2(i+1),t:p.name,d:p.tag,dInline:true,aux:p.lang,
            on:function(){go("project",{proj:p.name});}};
  }),"projects","ledger");
  setStatus(stdHints(true));
}
function vProject(){
  var p=projByName(ST.proj);
  if(!p)return go("projects");
  var w=frame([{t:"~",go:"menu"},{t:"projects",go:"projects"},{t:p.name}]);
  w.appendChild(h("p","vkick stamp",pad2(PROJECTS.indexOf(p)+1)+" · "+p.tag));
  w.appendChild(h("p","vtitle stamp",p.name+' <span class="badge">'+p.lang+"</span>"));
  w.appendChild(h("div","slip",projDetailHTML(p)));
  addRows(w,[
    {t:"open github.com/georgenijo/"+p.name+" ↗",href:GH+"/"+p.name},
    {t:"back to projects",on:back}
  ],"project:"+p.name,"acts");
  inkIn(w);
  setStatus(stdHints(false));
}
function vClosed(){
  crumbEl.innerHTML="";appEl.hidden=true;
  bootWrap.hidden=false;
  bootWrap.innerHTML='<div class="closed reveal">'+
    '<p class="msg">Connection to georgenijo.com closed.</p>'+
    '<p>Thanks for stopping by.</p>'+
    '<button class="reconnect" type="button" id="reconn">➜ ~ $ ssh georgenijo.com  (reconnect)</button></div>';
  var b=document.getElementById("reconn");
  b.addEventListener("click",restart);b.focus();
}
function restart(){
  bootWrap.innerHTML="";
  var pre=document.createElement("pre");pre.id="bootpre";
  bootWrap.appendChild(pre);bootPre=pre;
  ST.view="menu";ST.cursors={};runBoot();
}

/* ── input ──────────────────────────────────────────────────── */
bootWrap.addEventListener("click",function(){if(booting)skipBoot();});
window.addEventListener("keydown",function(e){
  if(booting){skipBoot();return;}
  if(ST.view==="closed"){
    if(e.key==="Enter"||e.key.toLowerCase()==="r"){e.preventDefault();restart();}
    return;
  }
  var k=e.key;
  if(k==="ArrowDown"||k==="j"){e.preventDefault();if(ST.rows.length){ST.cursor=Math.min(ST.cursor+1,ST.rows.length-1);paintCursor();}}
  else if(k==="ArrowUp"||k==="k"){e.preventDefault();if(ST.rows.length){ST.cursor=Math.max(ST.cursor-1,0);paintCursor();}}
  else if(k==="Enter"){
    if(document.activeElement&&document.activeElement.closest&&
       document.activeElement.closest(".crumb"))return; // crumb link focused: let it activate
    var r=ST.rows[ST.cursor];if(!r)return;
    if(document.activeElement===r.el)return;
    e.preventDefault();
    if(r.href)r.el.click();else if(r.on)r.on();
  }
  else if(k==="Escape"){e.preventDefault();back();}
  else if(k==="q"&&!e.metaKey&&!e.ctrlKey&&!e.altKey){e.preventDefault();quit();}
});

runBoot();
})();
</script>
</body>
</html>
