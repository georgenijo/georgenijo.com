<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>404 — George Nijo</title>
<meta name="robots" content="noindex">
<meta name="theme-color" media="(prefers-color-scheme: light)" content="#f6f2e8">
<meta name="theme-color" media="(prefers-color-scheme: dark)" content="#171310">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%23f6f2e8'/%3E%3Ctext x='16' y='22' font-family='monospace' font-size='16' font-weight='bold' fill='%23b5351c' text-anchor='middle'%3E%E2%80%BA_%3C/text%3E%3C/svg%3E">
<style>
  :root{
    --bg:#f6f2e8;
    --fg:#1c1710;
    --muted:#6e6353;
    --faint:#a2957f;
    --border:#1c1710;
    --hairline:#d9d0bd;
    --accent:#b5351c;
    --mono:ui-monospace,"SF Mono",SFMono-Regular,Menlo,Consolas,"Cascadia Mono",monospace;
    --serif:'Iowan Old Style','Charter',Georgia,serif;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --bg:#171310;
      --fg:#e8e2d4;
      --muted:#a2957f;
      --faint:#6e6353;
      --border:#e8e2d4;
      --hairline:#3a3126;
      --accent:#e06a50;
    }
  }
  *,*::before,*::after{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    background:var(--bg);color:var(--fg);
    font-family:var(--mono);font-size:14px;line-height:1.6;
    -webkit-font-smoothing:antialiased;
    display:flex;align-items:center;justify-content:center;
    min-height:100%;padding:20px;
  }
  .wrap{width:100%;max-width:640px;animation:fadeUp .35s ease both;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
  .masthead{
    font-family:var(--serif);font-style:italic;font-weight:600;
    font-size:1.1em;letter-spacing:-0.01em;
    border-bottom:2px solid var(--border);
    padding-bottom:10px;margin-bottom:22px;
  }
  pre{margin:0 0 4px;font:inherit;white-space:pre-wrap;word-break:break-word;}
  .sig{color:var(--accent);}
  .err{color:var(--fg);}
  .path{color:var(--fg);}
  .exit{color:var(--muted);margin:2px 0 22px;}
  .cur{display:inline-block;width:.6em;height:1.05em;background:var(--fg);vertical-align:-.15em;animation:blink 1.06s steps(1) infinite;}
  @keyframes blink{50%{opacity:0;}}
  .home{
    display:inline-flex;align-items:center;min-height:44px;
    color:var(--fg);text-decoration:none;
    border-bottom:1px solid var(--hairline);
  }
  .home:hover{color:var(--accent);border-bottom-color:var(--accent);}
  .home .sig{margin-right:.4em;}
  .footline{color:var(--faint);font-size:.82em;margin-top:26px;}
  @media (max-width:400px){ body{font-size:13px;} }
  @media (prefers-reduced-motion: reduce){
    .wrap{animation:none;}
    .cur{animation:none;}
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="masthead">George <em>Nijo</em></div>
  <pre><span class="sig">➜ ~ $</span> cat <span class="path" id="path">this path</span></pre>
  <pre class="err">cat: <span class="path" id="path2">this path</span>: No such file or directory</pre>
  <p class="exit">exit 127</p>
  <pre><span class="sig">➜ ~ $</span> <a class="home" href="/"><span class="sig">cd</span>&nbsp;~</a><span class="cur" aria-hidden="true"></span></pre>
  <p class="footline">404 — nothing lives at that path.</p>
</div>
<script>
(function(){
  "use strict";
  var p = (location.pathname || "/");
  var a = document.getElementById("path");
  var b = document.getElementById("path2");
  if (a) a.textContent = p;
  if (b) b.textContent = p;
})();
</script>
</body>
</html>
